<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DM Tools</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; background:#0a0a0a; color:#fff; font-family:-apple-system,sans-serif; }
        body { display:flex; align-items:center; justify-content:center; }
        .box { display:flex; flex-direction:column; align-items:center; gap:12px; }
        .logo-img { width:220px; height:auto; object-fit:contain; }
        .msg { color:#8a8a8a; font-size:14px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="logo.png" class="logo-img" alt="DM Tools">
        <div class="msg" id="msg">Authenticating...</div>
    </div>
    <script>
        /* ── Inverted favicon ── */
var faviconImg = new Image();
faviconImg.crossOrigin = 'anonymous';
faviconImg.onload = function() {
    var canvas = document.createElement('canvas');
    canvas.width = faviconImg.width;
    canvas.height = faviconImg.height;
    var ctx = canvas.getContext('2d');
    ctx.drawImage(faviconImg, 0, 0);
    var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    var data = imageData.data;
    for (var i = 0; i < data.length; i += 4) {
    if (data[i + 3] > 0) {
        data[i]     = 255 - data[i];
        data[i + 1] = 255 - data[i + 1];
        data[i + 2] = 255 - data[i + 2];
    }
}
    ctx.putImageData(imageData, 0, 0);
    var link = document.createElement('link');
    link.rel = 'icon';
    link.href = canvas.toDataURL('image/png');
    document.head.appendChild(link);
};
faviconImg.src = 'logodm.png';

        /* ── Auth relay ── */
        var RELAY_URL = 'https://script.google.com/macros/s/AKfycbw0LNLiy2Zgn5cQ0qIFDQ_e-x0Jjd2QT3pvxHNt9s2qEbOyINYGv5G3ERS6Dwgy3MvV/exec';
        var params = new URLSearchParams(window.location.search);
        var code   = params.get('code');
        var state  = params.get('state');
        var error  = params.get('error');

        if (error) {
            document.getElementById('msg').textContent = 'Access denied. You can close this window.';
        } else if (code && state) {
            fetch(RELAY_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ state: state, code: code })
            });
            document.getElementById('msg').textContent = 'Authenticated! You can close this window.';
        } else {
            document.getElementById('msg').textContent = 'Invalid parameters.';
        }
    </script>
</body>
</html>

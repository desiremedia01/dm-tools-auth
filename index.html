<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DM Tools</title>
    <link rel="icon" type="image/png" href="logodm.png">
    <style>
        body { margin:0; background:#0a0a0a; color:#fff; font-family:-apple-system,sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; }
        .box { display:flex; flex-direction:column; align-items:center; gap:12px; }
        .logo-img { width:220px; height:auto; object-fit:contain; }
        .msg { color:#8a8a8a; font-size:14px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="logo.png" class="logo-img" alt="DM Tools">
        <div class="msg" id="msg">Authenticating...</div>
    </div>
    <script>
        var RELAY_URL = 'https://script.google.com/macros/s/AKfycbw0LNLiy2Zgn5cQ0qIFDQ_e-x0Jjd2QT3pvxHNt9s2qEbOyINYGv5G3ERS6Dwgy3MvV/exec';
        var params = new URLSearchParams(window.location.search);
        var code   = params.get('code');
        var state  = params.get('state');
        var error  = params.get('error');

        if (error) {
            document.getElementById('msg').textContent = 'Access denied. You can close this window.';
        } else if (code && state) {
            fetch(RELAY_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ state: state, code: code })
            });
            document.getElementById('msg').textContent = 'Authenticated! You can close this window.';
        } else {
            document.getElementById('msg').textContent = 'Invalid parameters.';
        }
    </script>
</body>
</html>

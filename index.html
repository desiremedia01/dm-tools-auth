<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DM Tools</title>
    <style>
        body { margin:0; background:#0a0a0a; color:#fff; font-family:-apple-system,sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; }
        .logo { font-size:28px; font-weight:700; color:#0693e3; margin-bottom:8px; text-align:center; }
        .msg  { color:#8a8a8a; font-size:14px; text-align:center; }
    </style>
</head>
<body>
    <div>
        <div class="logo">DM Tools</div>
        <div class="msg" id="msg">Authenticating...</div>
    </div>
    <script>
        var params = new URLSearchParams(window.location.search);
        var code   = params.get('code');
        var error  = params.get('error');
        if (error) {
            document.getElementById('msg').textContent = 'Access denied. You can close this window.';
            if (window.opener) window.opener.postMessage({ type: 'dm_auth_error', error: error }, '*');
        } else if (code) {
            document.getElementById('msg').textContent = 'Authenticated! You can close this window.';
            if (window.opener) window.opener.postMessage({ type: 'dm_auth_code', code: code }, '*');
            setTimeout(function() { window.close(); }, 1500);
        } else {
            document.getElementById('msg').textContent = 'Invalid parameters.';
        }
    </script>
</body>
</html>
